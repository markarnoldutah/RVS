<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>RV Service Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="_content/RVS.UI.Shared/css/design-tokens.css" rel="stylesheet" />
    <link href="app.css" rel="stylesheet" />
    <link href="RVS.Blazor.Intake.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <!-- Loading screen — replaced by Blazor once the WASM runtime initializes -->
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                    min-height:100vh;font-family:Roboto,Helvetica,Arial,sans-serif;background:#FAFAFA;">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
                 fill="#1565C0" style="margin-bottom:24px;">
                <path d="M20 17v-6c0-1.1-.9-2-2-2h-3V7c0-1.1-.9-2-2-2H7c-1.1 0-2 .9-2 2v4H2v6h2
                         c0 1.66 1.34 3 3 3s3-1.34 3-3h4c0 1.66 1.34 3 3 3s3-1.34 3-3h2zm-14
                         2c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM7 13V7h6v6H7zm10
                         6c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm1-6h-4V9h3c.55 0
                         1 .45 1 1v3z"/>
            </svg>
            <h3 style="margin:0 0 8px;font-weight:500;font-size:1.5rem;color:#1565C0;">
                RV Service Flow
            </h3>
            <p style="margin:0 0 24px;font-size:0.875rem;color:#757575;">
                Loading application&hellip;
            </p>
            <div style="width:200px;height:4px;background:#E0E0E0;border-radius:2px;overflow:hidden;">
                <div style="width:40%;height:100%;background:#1565C0;border-radius:2px;
                            animation:loading-progress 1.5s ease-in-out infinite;"></div>
            </div>
            <style>
                @keyframes loading-progress {
                    0%   { transform: translateX(-150%); }
                    100% { transform: translateX(350%); }
                }
            </style>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/interop.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
