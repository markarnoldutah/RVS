<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RVS Manager</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="_content/RVS.UI.Shared/css/design-tokens.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link href="RVS.Blazor.Manager.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <!-- Loading screen — replaced by Blazor once the WASM runtime initializes -->
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                    min-height:100vh;font-family:Roboto,Helvetica,Arial,sans-serif;background:#FAFAFA;">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
                 fill="#1565C0" style="margin-bottom:24px;" aria-hidden="true">
                <path d="M20 17v-6c0-1.1-.9-2-2-2h-3V7c0-1.1-.9-2-2-2H7c-1.1 0-2 .9-2 2v4H2v6h2
                         c0 1.66 1.34 3 3 3s3-1.34 3-3h4c0 1.66 1.34 3 3 3s3-1.34 3-3h2zm-14
                         2c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zM7 13V7h6v6H7zm10
                         6c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm1-6h-4V9h3c.55 0
                         1 .45 1 1v3z"/>
            </svg>
            <h3 style="margin:0 0 8px;font-weight:500;font-size:1.5rem;color:#1565C0;">
                RVS Manager
            </h3>
            <p style="margin:0 0 24px;font-size:0.875rem;color:#757575;">
                Loading application&hellip;
            </p>
            <div style="width:200px;height:4px;background:#E0E0E0;border-radius:2px;overflow:hidden;"
                 role="progressbar" aria-label="Loading application">
                <div style="width:40%;height:100%;background:#1565C0;border-radius:2px;
                            animation:loading-progress 1.5s ease-in-out infinite;"></div>
            </div>
            <style>
                @keyframes loading-progress {
                    0%   { transform: translateX(-150%); }
                    100% { transform: translateX(350%); }
                }
            </style>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>

    <!-- Application Insights JS SDK — connection string injected at deploy time via appsettings.json -->
    <script>
        !(function (cfg) {
            function e(e, t) { var n = {}, a = {}; return a.traceFlags = 1, a.version = "00", t && (a.traceId = t),
                { name: "Microsoft.ApplicationInsights." + e, time: new Date().toISOString(), iKey: "", tags: a, data: { baseType: e + "Data", baseData: n } }; }
            var n, a, t, i, o, s, r;
            cfg.url = cfg.url || "https://js.monitor.azure.com/scripts/b/ai.3.gbl.min.js";
            (n = cfg.name || "appInsights"), (a = window), (t = document);
            try {
                if (a[n] !== undefined) return;
            } catch (e) { return; }
            a.appInsightsConfig = cfg;
            i = t.createElement("script");
            i.src = cfg.url;
            i.async = true;
            o = t.getElementsByTagName("script")[0];
            o.parentNode.insertBefore(i, o);
            s = "track,trackPage,trackEvent,trackException,trackMetric,startTrackPage,stopTrackPage,addTelemetryInitializer,setAuthenticatedUserContext,clearAuthenticatedUserContext,flush".split(",");
            r = { config: cfg, initialize: true };
            for (var c = 0; c < s.length; c++) (function (e) { r[e] = function () { var t = arguments; r.queue = r.queue || []; r.queue.push(function () { r[e].apply(r, t); }); }; })(s[c]);
            a[n] = r;

            connectionString: window.__appInsightsConnectionString || ""

    <script>
        // Load App Insights connection string from Blazor appsettings.json at startup
        (async function () {
            try {
                var resp = await fetch('appsettings.json');
                if (resp.ok) {
                    var cfg = await resp.json();
                    var cs = (cfg.ApplicationInsights && cfg.ApplicationInsights.ConnectionString) || "";
                    if (cs && window.appInsights && window.appInsights.config) {
                        window.appInsights.config.connectionString = cs;
                    }
                }
            } catch (e) { /* appsettings.json may not exist in dev */ }
        })();
    </script>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/download.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        // .NET 10: blazor.boot.json was inlined into dotnet.js, so the
        // blazor-environment response header is no longer read. Detect
        // the environment at runtime from the hostname instead.
        const hostname = window.location.hostname;
        let env = 'Production';
        if (hostname.includes('localhost') || hostname.includes('127.0.0.1')) {
            env = 'Development';
        } else if (hostname.includes('mango')) {
            env = 'Staging';
        }
        Blazor.start({ environment: env });
    </script>
</body>

</html>
