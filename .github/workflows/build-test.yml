name: Build & Test

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    concurrency:
      group: build-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache wasm-tools workload
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: |
            /usr/share/dotnet/metadata
            /usr/share/dotnet/packs
            /usr/share/dotnet/library-packs
          key: wasm-tools-${{ runner.os }}-${{ env.DOTNET_VERSION }}

      - name: Install wasm-tools workload
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: dotnet workload install wasm-tools

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore RVS.slnx

      - name: Build solution
        run: dotnet build RVS.slnx --configuration Release

      - name: Run Domain tests with coverage
        run: >-
          dotnet test Tests/RVS.Domain.Tests/RVS.Domain.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=domain-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Run API tests with coverage
        run: >-
          dotnet test Tests/RVS.API.Tests/RVS.API.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=api-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Run UI Shared tests with coverage
        run: >-
          dotnet test Tests/RVS.UI.Shared.Tests/RVS.UI.Shared.Tests.csproj

  # ---------------------------------------------------------------------------
  # Detect which app paths changed (only on push to main)
  # ---------------------------------------------------------------------------
  detect-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      intake: ${{ steps.filter.outputs.intake }}
      manager: ${{ steps.filter.outputs.manager }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          api:
            - 'RVS.API/**'
            - 'RVS.Domain/**'
            - 'RVS.Infra.**/**'
            - 'Docs/ASOT/Infra/Bicep.IaC/**'
          intake:
            - 'RVS.Blazor.Intake/**'
            - 'RVS.UI.Shared/**'
            - 'RVS.Domain/**'
            - 'Docs/ASOT/Infra/Bicep.IaC/**'
          manager:
            - 'RVS.Blazor.Manager/**'
            - 'RVS.UI.Shared/**'
            - 'RVS.Domain/**'
            - 'Docs/ASOT/Infra/Bicep.IaC/**'

  # ---------------------------------------------------------------------------
  # Deploy API — App Service + Bicep infrastructure
  # ---------------------------------------------------------------------------
  deploy-api:
    if: needs.detect-changes.outputs.api == 'true'
    needs: [build-and-test, detect-changes]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish API
      run: dotnet publish RVS.API/RVS.API.csproj --configuration Release --output ./publish/api

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy API Bicep
      uses: azure/arm-deploy@v2
      with:
        scope: subscription
        region: ${{ secrets.AZURE_LOCATION || 'westus2' }}
        template: ./Docs/ASOT/Infra/Bicep.IaC/main.bicep
        parameters: deployTarget=api
        failOnStdErr: false

    - name: Deploy API to App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.API_APP_NAME || 'rvs-api' }}
        package: ./publish/api

  # ---------------------------------------------------------------------------
  # Deploy Intake — Static Web App + Bicep infrastructure
  # ---------------------------------------------------------------------------
  deploy-intake:
    if: needs.detect-changes.outputs.intake == 'true'
    needs: [build-and-test, detect-changes]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish Intake
      run: dotnet publish RVS.Blazor.Intake/RVS.Blazor.Intake.csproj --configuration Release --output ./publish/intake

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy Intake Bicep
      uses: azure/arm-deploy@v2
      with:
        scope: subscription
        region: ${{ secrets.AZURE_LOCATION || 'westus2' }}
        template: ./Docs/ASOT/Infra/Bicep.IaC/main.bicep
        parameters: deployTarget=intake
        failOnStdErr: false

    - name: Deploy Intake to Static Web App
      uses: azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.INTAKE_SWA_TOKEN }}
        action: upload
        app_location: ./publish/intake/wwwroot

  # ---------------------------------------------------------------------------
  # Deploy Manager — Static Web App + Bicep infrastructure
  # ---------------------------------------------------------------------------
  deploy-manager:
    if: needs.detect-changes.outputs.manager == 'true'
    needs: [build-and-test, detect-changes]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish Manager
      run: dotnet publish RVS.Blazor.Manager/RVS.Blazor.Manager.csproj --configuration Release --output ./publish/manager

    - name: Login to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy Manager Bicep
      uses: azure/arm-deploy@v2
      with:
        scope: subscription
        region: ${{ secrets.AZURE_LOCATION || 'westus2' }}
        template: ./Docs/ASOT/Infra/Bicep.IaC/main.bicep
        parameters: deployTarget=manager
        failOnStdErr: false

    - name: Deploy Manager to Static Web App
      uses: azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.MANAGER_SWA_TOKEN }}
        action: upload
        app_location: ./publish/manager/wwwroot
          --configuration Release
          --no-build
          --logger "trx;LogFileName=ui-shared-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 14
