name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Deploy API (swap staging slot to production)"
        type: boolean
        default: true
      deploy_intake:
        description: "Deploy Intake SWA to production"
        type: boolean
        default: true
      deploy_manager:
        description: "Deploy Manager SWA to production"
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the staging run that produced the artifacts to promote
  # ---------------------------------------------------------------------------
  resolve-staging-run:
    name: Resolve Staging Run
    if: inputs.deploy_intake || inputs.deploy_manager
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      run_id: ${{ steps.find.outputs.run_id }}
      head_sha: ${{ steps.find.outputs.head_sha }}
    steps:
      - name: Find latest successful deploy-staging run
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/deploy-staging.yml/runs?branch=main&status=success&per_page=1" \
            --jq '.workflow_runs[0] | {id, head_sha}')

          RUN_ID=$(echo "$RUN" | jq -r '.id')
          HEAD_SHA=$(echo "$RUN" | jq -r '.head_sha')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No successful deploy-staging run found on the main branch."
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved staging run ID: $RUN_ID (SHA: $HEAD_SHA)"

  # ---------------------------------------------------------------------------
  # Swap API staging slot to production
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Swap API Staging → Production
    if: inputs.deploy_api
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: deploy-production-api
      cancel-in-progress: false
    steps:
      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging slot to production
        run: |
          az webapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.API_APP_SERVICE_NAME }}" \
            --slot staging \
            --target-slot production

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Deploy Intake SWA to production
  # ---------------------------------------------------------------------------
  deploy-intake:
    name: Deploy Intake SWA to Production
    if: inputs.deploy_intake
    needs: resolve-staging-run
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
      actions: read
    concurrency:
      group: deploy-production-intake
      cancel-in-progress: false
    steps:
      - name: Download Intake artifact from staging run
        uses: actions/download-artifact@v4
        with:
          name: intake-wwwroot-${{ needs.resolve-staging-run.outputs.head_sha }}
          path: ./publish/intake/wwwroot
          run-id: ${{ needs.resolve-staging-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ vars.INTAKE_SWA_NAME }}" \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Intake to production
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./publish/intake/wwwroot
          skip_app_build: true

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Deploy Manager SWA to production
  # ---------------------------------------------------------------------------
  deploy-manager:
    name: Deploy Manager SWA to Production
    if: inputs.deploy_manager
    needs: resolve-staging-run
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
      actions: read
    concurrency:
      group: deploy-production-manager
      cancel-in-progress: false
    steps:
      - name: Download Manager artifact from staging run
        uses: actions/download-artifact@v4
        with:
          name: manager-wwwroot-${{ needs.resolve-staging-run.outputs.head_sha }}
          path: ./publish/manager/wwwroot
          run-id: ${{ needs.resolve-staging-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ vars.MANAGER_SWA_NAME }}" \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Manager to production
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./publish/manager/wwwroot
          skip_app_build: true

      - name: Azure logout
        if: always()
        run: az logout
