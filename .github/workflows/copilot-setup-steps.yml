name: "Copilot Setup Steps"

# Triggers:
# - workflow_dispatch: manual trigger for production deployments and validation
# - push to any branch: CI build & test
# - push to main: staging deployment
# - push mobile-v* tags: mobile builds
# - PR to any branch: CI build & test
on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "mobile-v*"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ---------------------------------------------------------------------------
  # Copilot Agent Environment Setup
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  # ---------------------------------------------------------------------------
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore

  # ---------------------------------------------------------------------------
  # CI: Build & Test (push to any branch / PR)
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    if: >-
      (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
      || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: build-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore RVS.slnx

      - name: Build solution
        run: dotnet build RVS.slnx --configuration Release --no-restore

      - name: Run Domain tests with coverage
        run: >-
          dotnet test Tests/RVS.Domain.Tests/RVS.Domain.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=domain-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Run API tests with coverage
        run: >-
          dotnet test Tests/RVS.API.Tests/RVS.API.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=api-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Run UI Shared tests with coverage
        run: >-
          dotnet test Tests/RVS.UI.Shared.Tests/RVS.UI.Shared.Tests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=ui-shared-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 14

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ./TestResults/**/coverage.cobertura.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Staging: Build & Publish artifacts (merge to main only)
  # ---------------------------------------------------------------------------
  build-staging:
    name: Build for Staging
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore RVS.slnx

      - name: Build solution
        run: dotnet build RVS.slnx --configuration Release --no-restore

      - name: Publish API
        run: >-
          dotnet publish RVS.API/RVS.API.csproj
          --configuration Release
          --no-build
          --output ./publish/api

      - name: Publish Blazor Intake
        run: >-
          dotnet publish RVS.Blazor.Intake/RVS.Blazor.Intake.csproj
          --configuration Release
          --no-build
          --output ./publish/intake

      - name: Publish Blazor Manager
        run: >-
          dotnet publish RVS.Blazor.Manager/RVS.Blazor.Manager.csproj
          --configuration Release
          --no-build
          --output ./publish/manager

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish/api
          retention-days: 7

      - name: Upload Intake artifact
        uses: actions/upload-artifact@v4
        with:
          name: intake-publish
          path: ./publish/intake
          retention-days: 7

      - name: Upload Manager artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager-publish
          path: ./publish/manager
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Staging: Deploy API to staging slot
  # ---------------------------------------------------------------------------
  deploy-staging-api:
    name: Deploy API to Staging Slot
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    needs: build-staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./api

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.API_APP_SERVICE_NAME }}
          slot-name: staging
          package: ./api

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Staging: Deploy Intake SWA
  # ---------------------------------------------------------------------------
  deploy-staging-intake:
    name: Deploy Intake SWA to Staging
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    needs: build-staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Intake artifact
        uses: actions/download-artifact@v4
        with:
          name: intake-publish
          path: ./intake

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ vars.INTAKE_SWA_NAME }}" \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Intake to staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./intake/wwwroot
          skip_app_build: true
          deployment_environment: staging

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Staging: Deploy Manager SWA
  # ---------------------------------------------------------------------------
  deploy-staging-manager:
    name: Deploy Manager SWA to Staging
    if: >-
      github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    needs: build-staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Manager artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-publish
          path: ./manager

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ vars.MANAGER_SWA_NAME }}" \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Manager to staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./manager/wwwroot
          skip_app_build: true
          deployment_environment: staging

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Production: Swap API staging slot to production (manual approval)
  # ---------------------------------------------------------------------------
  deploy-production-api:
    name: Swap API Staging Slot to Production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging slot to production
        run: |
          az webapp deployment slot swap \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.API_APP_SERVICE_NAME }}" \
            --slot staging \
            --target-slot production

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Production: Deploy Intake SWA (manual approval)
  # ---------------------------------------------------------------------------
  deploy-production-intake:
    name: Deploy Intake SWA to Production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Blazor Intake
        run: >-
          dotnet publish RVS.Blazor.Intake/RVS.Blazor.Intake.csproj
          --configuration Release
          --output ./publish/intake

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ vars.INTAKE_SWA_NAME }}" \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Intake to production
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./publish/intake/wwwroot
          skip_app_build: true

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Production: Deploy Manager SWA (manual approval)
  # ---------------------------------------------------------------------------
  deploy-production-manager:
    name: Deploy Manager SWA to Production
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Blazor Manager
        run: >-
          dotnet publish RVS.Blazor.Manager/RVS.Blazor.Manager.csproj
          --configuration Release
          --output ./publish/manager

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ vars.MANAGER_SWA_NAME }}" \
            --query "properties.apiKey" \
            --output tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Manager to production
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./publish/manager/wwwroot
          skip_app_build: true

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Mobile: Build Android APK (on mobile-v* tags)
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android (APK)
    if: startsWith(github.ref, 'refs/tags/mobile-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore RVS.MAUI.Tech/RVS.MAUI.Tech.csproj

      - name: Build Android APK
        run: >-
          dotnet publish RVS.MAUI.Tech/RVS.MAUI.Tech.csproj
          --configuration Release
          --framework net10.0-android
          --output ./artifacts/android

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/android/**/*.apk
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Mobile: Build iOS IPA (on mobile-v* tags)
  # ---------------------------------------------------------------------------
  build-ios:
    name: Build iOS (IPA)
    if: startsWith(github.ref, 'refs/tags/mobile-v')
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui-ios

      - name: Restore dependencies
        run: dotnet restore RVS.MAUI.Tech/RVS.MAUI.Tech.csproj

      - name: Build iOS IPA
        run: >-
          dotnet publish RVS.MAUI.Tech/RVS.MAUI.Tech.csproj
          --configuration Release
          --framework net10.0-ios
          --output ./artifacts/ios
          -p:ArchiveOnBuild=true
          -p:RuntimeIdentifier=ios-arm64

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ./artifacts/ios/**/*.ipa
          retention-days: 90
