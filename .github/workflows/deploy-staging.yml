name: Deploy to Staging

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which apps have changes and need deployment
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      intake: ${{ steps.filter.outputs.intake }}
      manager: ${{ steps.filter.outputs.manager }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed paths
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "--- Changed files ---"
          echo "$CHANGED"
          echo "---------------------"

          # API: RVS.API + Domain + all Infra projects
          API_CHANGED=$(echo "$CHANGED" | grep -qE '^(RVS\.API/|RVS\.Domain/|RVS\.Infra\.)' && echo true || echo false)

          # Intake: Blazor.Intake + UI.Shared + Domain (shared dependency)
          INTAKE_CHANGED=$(echo "$CHANGED" | grep -qE '^(RVS\.Blazor\.Intake/|RVS\.UI\.Shared/|RVS\.Domain/)' && echo true || echo false)

          # Manager: Blazor.Manager + UI.Shared + Domain (shared dependency)
          MANAGER_CHANGED=$(echo "$CHANGED" | grep -qE '^(RVS\.Blazor\.Manager/|RVS\.UI\.Shared/|RVS\.Domain/)' && echo true || echo false)

          echo "api=$API_CHANGED" >> "$GITHUB_OUTPUT"
          echo "intake=$INTAKE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "manager=$MANAGER_CHANGED" >> "$GITHUB_OUTPUT"

          echo "API changed: $API_CHANGED"
          echo "Intake changed: $INTAKE_CHANGED"
          echo "Manager changed: $MANAGER_CHANGED"

  # ---------------------------------------------------------------------------
  # Build & Test (full solution — always runs to validate nothing is broken)
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.api == 'true'
      || needs.detect-changes.outputs.intake == 'true'
      || needs.detect-changes.outputs.manager == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache wasm-tools workload
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: |
            /usr/share/dotnet/metadata
            /usr/share/dotnet/packs
            /usr/share/dotnet/library-packs
          key: wasm-tools-${{ runner.os }}-${{ env.DOTNET_VERSION }}

      - name: Install wasm-tools workload
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: dotnet workload install wasm-tools

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore RVS.slnx

      - name: Build solution
        run: dotnet build RVS.slnx --configuration Release

      - name: Run Domain tests
        run: >-
          dotnet test Tests/RVS.Domain.Tests/RVS.Domain.Tests.csproj
          --configuration Release --no-build

      - name: Run API tests
        run: >-
          dotnet test Tests/RVS.API.Tests/RVS.API.Tests.csproj
          --configuration Release --no-build

      - name: Run UI Shared tests
        run: >-
          dotnet test Tests/RVS.UI.Shared.Tests/RVS.UI.Shared.Tests.csproj
          --configuration Release --no-build

      # --- Publish only the changed apps ---

      - name: Publish API
        if: needs.detect-changes.outputs.api == 'true'
        run: >-
          dotnet publish RVS.API/RVS.API.csproj
          --configuration Release --no-build --output ./publish/api

      - name: Upload API artifact
        if: needs.detect-changes.outputs.api == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish/api
          retention-days: 7

      - name: Publish Blazor Intake
        if: needs.detect-changes.outputs.intake == 'true'
        run: >-
          dotnet publish RVS.Blazor.Intake/RVS.Blazor.Intake.csproj
          --configuration Release --no-build --output ./publish/intake

      - name: Upload Intake artifact
        if: needs.detect-changes.outputs.intake == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: intake-wwwroot-${{ github.sha }}
          path: ./publish/intake/wwwroot
          retention-days: 30
          if-no-files-found: error

      - name: Publish Blazor Manager
        if: needs.detect-changes.outputs.manager == 'true'
        run: >-
          dotnet publish RVS.Blazor.Manager/RVS.Blazor.Manager.csproj
          --configuration Release --no-build --output ./publish/manager

      - name: Upload Manager artifact
        if: needs.detect-changes.outputs.manager == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: manager-wwwroot-${{ github.sha }}
          path: ./publish/manager/wwwroot
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Deploy API to staging App Service (westus3)
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API to Staging
    needs: [detect-changes, build-and-test]
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./api

      - name: Login to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.API_APP_SERVICE_NAME }}
          package: ./api

      - name: Azure logout
        if: always()
        run: az logout

  # ---------------------------------------------------------------------------
  # Deploy Intake SWA to staging (westus2)
  # ---------------------------------------------------------------------------
  deploy-intake:
    name: Deploy Intake SWA to Staging
    needs: [detect-changes, build-and-test]
    if: needs.detect-changes.outputs.intake == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download Intake artifact
        uses: actions/download-artifact@v4
        with:
          name: intake-wwwroot-${{ github.sha }}
          path: ./intake

      - name: Deploy Intake to staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.INTAKE_SWA_TOKEN_STAGING }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./intake
          skip_app_build: true
          deployment_environment: staging

  # ---------------------------------------------------------------------------
  # Deploy Manager SWA to staging (westus2)
  # ---------------------------------------------------------------------------
  deploy-manager:
    name: Deploy Manager SWA to Staging
    needs: [detect-changes, build-and-test]
    if: needs.detect-changes.outputs.manager == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download Manager artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-wwwroot-${{ github.sha }}
          path: ./manager

      - name: Deploy Manager to staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.MANAGER_SWA_TOKEN_STAGING }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: ./manager
          skip_app_build: true
          deployment_environment: staging
